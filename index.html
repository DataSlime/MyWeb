<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataslime | Web</title>
    <style>
        :root {
            --bg-color: #fdfaf5;     /* 極淺奶油底色 */
            --header-bg: #e6dfd1;  /* 奶茶色標頭 */
            --header-text: #5d4037; /* 深咖啡色文字 */
            --card-bg: #ffffff;     /* 卡片純白底色 */
            --card-border: #d7ccc8; /* 卡片細邊框色 */
            --text-main: #3e2723;   /* 卡片主文字色 */
            --text-date: #8d6e63;   /* 日期淺色文字 */
            --accent: #bcaaa4;     /* 懸停時的卡片底色 (淺可可) */
            --hover-border: #a1887f; /* 懸停時的卡片邊框色 */
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部 Welcome 區域 */
        .main-container {
            width: 90%;
            max-width: 600px; /* 控制整體寬度，符合草圖的緊湊感 */
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(93, 64, 55, 0.08); /* 淡淡的大地色陰影 */
            margin: 40px auto;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }

        .header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--card-border);
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* 卡片網格區域 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 兩列 */
            gap: 20px; /* 卡片間距 */
            padding: 40px; /* 內縮 */
        }

        /* 可點擊的卡片樣式 */
        .project-card {
            background: var(--card-bg);
            border: 2px solid var(--card-border); /* 符合草圖的粗邊線感 */
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            aspect-ratio: 1 / 1; /* 保持正方形 */
            cursor: pointer;
            text-decoration: none; /* 去除超連結下劃線 */
            transition: all 0.3s ease; /* 變色的過渡效果 */
            box-sizing: border-box; /* 確保 padding 不影響尺寸 */
        }

        /* 滑鼠懸停時的變色效果 (變色、微陰影) */
        .project-card:hover {
            background-color: var(--accent); /* 卡片變色 */
            border-color: var(--hover-border); /* 邊框變色 */
            transform: translateY(-3px); /* 向上微浮動，增加互動感 */
            box-shadow: 0 5px 15px rgba(141, 110, 99, 0.2);
        }

        .project-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .update-label {
            font-size: 0.85rem;
            color: var(--text-date);
            font-weight: 400;
            margin: 2px 0;
        }

        .update-date {
            font-size: 0.85rem;
            color: var(--text-date);
            font-weight: 600; /* 日期加粗 */
        }

        /* 手機版優化 */
        @media (max-width: 500px) {
            .card-grid {
                padding: 20px;
                gap: 15px;
            }
            .header h1 { font-size: 1.5rem; }
            .project-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>Welcome to My Web</h1>
    </div>

    <div class="card-grid">
        <a href="###" class="project-card">
            <div class="project-title">Hacking Note</div>
            <div class="update-label">Last Update:</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Side Project</div>
            <div class="update-label">Last Update:</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Small Project</div>
            <div class="update-label">Last Update:</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Packet Project</div>
            <div class="update-label">Last Update:</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Work</div>
            <div class="update-label">Last Update:</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

    </div>
</div>

</body>
</html>
